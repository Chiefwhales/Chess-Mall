<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>CW ChessMall</title>
  </head>

  <body class="bg-slate-950">
    <div
      class="relative min-h-screen w-full flex flex-col items-center overflow-x-hidden"
    >
      <div class="absolute inset-0 z-0">
        <img
          src="images/chess-bg.webp"
          alt="A Sole Black Knight on a Chess Board"
          class="w-full h-full object-cover opacity-40"
        />
      </div>

      <header class="relative z-40 w-full px-6 py-8">
        <div
          class="max-w-7xl mx-auto flex flex-row items-center justify-between md:flex-col md:gap-8"
        >
          <h1
            class="text-2xl md:text-5xl lg:text-6xl font-bold text-white drop-shadow-2xl cursor-pointer text-left md:text-center"
          >
            Chief Whales Chess Mall
          </h1>

          <nav class="flex flex-col items-end md:items-center">
            <input type="checkbox" id="menu-toggle" class="peer hidden" />

            <label
              for="menu-toggle"
              class="md:hidden flex flex-col gap-1.5 p-2 cursor-pointer z-50 transition-transform active:scale-95"
            >
              <span
                class="w-8 h-1 bg-white rounded-full transition-all peer-checked:rotate-45 peer-checked:translate-y-2.5"
              ></span>
              <span
                class="w-8 h-1 bg-white rounded-full transition-all peer-checked:opacity-0"
              ></span>
              <span
                class="w-8 h-1 bg-white rounded-full transition-all peer-checked:-rotate-45 peer-checked:-translate-y-2.5"
              ></span>
            </label>

            <ul
              class="hidden peer-checked:flex md:flex flex-col md:flex-row gap-2 md:gap-4 justify-center items-end md:items-center absolute top-full right-6 md:static w-auto transition-all duration-300 z-50"
            >
              <li
                class="w-32 md:min-w-[140px] border-2 bg-white/10 hover:bg-white/20 text-white px-3 py-1.5 md:px-6 md:py-2 rounded-lg backdrop-blur-md border-white/20 cursor-pointer text-center transition-all text-sm md:text-base"
              >
                <a href="index.html" class="block w-full">Home</a>
              </li>
              <li
                class="w-32 md:min-w-[140px] border-2 bg-white/10 hover:bg-white/20 text-white px-3 py-1.5 md:px-6 md:py-2 rounded-lg backdrop-blur-md border-white/20 cursor-pointer text-center transition-all text-sm md:text-base"
              >
                <a href="Chess-Shop.html" class="block w-full">Chess Shop</a>
              </li>
              <li
                class="w-32 md:min-w-[140px] border-2 bg-white/10 hover:bg-white/20 text-white px-3 py-1.5 md:px-6 md:py-2 rounded-lg backdrop-blur-md border-white/20 cursor-pointer text-center transition-all text-sm md:text-base"
              >
                <a href="about-us.html" class="block w-full">About Us</a>
              </li>
              <li
                class="w-32 md:min-w-[140px] border-2 bg-white/10 hover:bg-white/20 text-white px-3 py-1.5 md:px-6 md:py-2 rounded-lg backdrop-blur-md border-white/20 cursor-pointer text-center transition-all text-sm md:text-base"
              >
                <a href="contact-us.html" class="block w-full">Contact Us</a>
              </li>
            </ul>
          </nav>
        </div>
      </header>

      <main
        class="relative z-10 flex-grow flex flex-col items-center justify-center px-6 pb-20"
      >
        <div
          class="mb-6 flex items-center gap-2 rounded-full border border-white/10 bg-white/5 px-4 py-1.5 backdrop-blur-md"
        >
          <span class="relative flex h-2 w-2">
            <span
              class="absolute inline-flex h-full w-full animate-ping rounded-full bg-blue-400 opacity-75"
            ></span>
            <span
              class="relative inline-flex h-2 w-2 rounded-full bg-blue-500"
            ></span>
          </span>
          <span
            class="text-[10px] font-bold tracking-[0.2em] text-white/70 uppercase"
            >New Collection Live</span
          >
        </div>

        <div class="relative max-w-4xl text-center mb-16">
          <h2
            class="mb-6 text-4xl font-extrabold tracking-tight text-white md:text-7xl lg:text-8xl"
          >
            Master the Board, <br />
            <span
              class="bg-gradient-to-r from-blue-400 via-indigo-400 to-white bg-clip-text text-transparent"
              >Rule the Deep.</span
            >
          </h2>
        </div>

        <div
          class="w-full max-w-2xl bg-black/40 backdrop-blur-xl border border-white/10 rounded-3xl p-8 shadow-2xl"
        >
          <form class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
              <label
                class="text-[10px] text-white/40 uppercase font-bold tracking-widest"
                >Full Name</label
              >
              <input
                type="text"
                required
                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:ring-2 focus:ring-blue-500 transition-all"
              />
            </div>
            <div class="space-y-2">
              <label
                class="text-[10px] text-white/40 uppercase font-bold tracking-widest"
                >Email</label
              >
              <input
                type="email"
                required
                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:ring-2 focus:ring-blue-500 transition-all"
              />
            </div>
            <div class="space-y-2">
              <label
                class="text-[10px] text-white/40 uppercase font-bold tracking-widest"
                >Target Date</label
              >
              <input
                type="date"
                required
                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white [color-scheme:dark] outline-none"
              />
            </div>
            <div class="space-y-2">
              <label
                class="text-[10px] text-white/40 uppercase font-bold tracking-widest"
                >Product Type</label
              >
              <select
                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none"
              >
                <option class="bg-slate-900">Custom Boards</option>
                <option class="bg-slate-900">Chess Clocks</option>
                <option class="bg-slate-900">Luxury Pieces</option>
              </select>
            </div>
            <button
              type="submit"
              class="md:col-span-2 w-full bg-white text-slate-950 font-black py-4 rounded-xl hover:bg-blue-500 hover:text-white transition-all uppercase tracking-widest"
            >
              Submit Move
            </button>
          </form>
        </div>
      </main>
    </div>

    <footer
      class="relative z-10 bg-white/10 backdrop-blur-md text-white border-t border-white/20 py-12 px-6"
    ></footer>
  </body>
</html>
