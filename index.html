<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>CW ChessMall</title>
  </head>

  <body>
    <div
      class="relative min-h-screen w-full flex flex-col items-center overflow-hidden bg-slate-950"
    >
      <div class="absolute inset-0 z-auto">
        <img
          src="images/chess-bg.webp"
          alt="A Sole Black Knight on a Chess Board"
          class="w-full h-full object-contain opacity-50"
        />
      </div>
      <header class="relative z-10 w-full">
        <h1
          class="text-4xl font-bold text-white text-center mt-20 drop-shadow-2xl"
        >
          Chief Whales Chess Mall
        </h1>
        <nav class="mt-8">
          <ul
            class="flex flex-col items-start md:flex-row gap-4 items-center justify-center"
          >
            <li
              class="w-[9rem] ml-3 border-2 bg-white/10 hover:bg-white/20 text-white px-6 py-2 rounded-lg backdrop-blur-md border border-white/20 cursor-pointer text-center"
            >
              <a href="#">Home Page</a>
            </li>
            <li
              class="w-[9rem] ml-3 border-2 bg-white/10 hover:bg-white/20 text-white px-6 py-2 rounded-lg backdrop-blur-md border border-white/20 cursor-pointer text-center"
            >
              <a href="#" class="block w-full">Chess Shop</a>
            </li>
            <li
              class="w-[9rem] ml-3 border-2 bg-white/10 hover:bg-white/20 text-white px-6 py-2 rounded-lg backdrop-blur-md border border-white/20 cursor-pointer text-center"
            >
              <a href="#">About Us</a>
            </li>
            <li
              class="w-[9rem] ml-3 border-2 bg-white/10 hover:bg-white/20 text-white px-6 py-2 rounded-lg backdrop-blur-md border border-white/20 cursor-pointer text-center"
            >
              <a href="#"> Contact Us</a>
            </li>
          </ul>
        </nav>
      </header>
      <main></main>
      <footer></footer>
    </div>
  </body>
</html>
