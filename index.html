<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>CW ChessMall</title>
  </head>

  <body class="bg-slate-950">
    <div
      class="relative min-h-screen w-full flex flex-col items-center overflow-x-hidden"
    >
      <div class="absolute inset-0 z-0">
        <img
          src="images/chess-bg.webp"
          alt="A Sole Black Knight on a Chess Board"
          class="w-full h-full object-cover opacity-40"
        />
      </div>

      <header class="relative z-10 w-full px-4">
        <h1
          class="mt-12 text-3xl md: mt-20 text-5xl lg:text-6xl font-bold text-white text-center drop-shadow-2xl"
        >
          Chief Whales Chess Mall
        </h1>

        <nav class="mt-8">
          <ul class="flex flex-col md:flex-row gap-4 justify-center">
            <li
              class="w-full max-w-[12rem] border-2 bg-white/10 hover:bg-white/20 text-white px-6 py-2 rounded-lg backdrop-blur-md border-white/20 cursor-pointer text-center transition-all"
            >
              <a href="#" class="block w-full">Home Page</a>
            </li>
            <li
              class="w-full max-w-[12rem] border-2 bg-white/10 hover:bg-white/20 text-white px-6 py-2 rounded-lg backdrop-blur-md border-white/20 cursor-pointer text-center transition-all"
            >
              <a href="#" class="block w-full">Chess Shop</a>
            </li>
            <li
              class="w-full max-w-[12rem] border-2 bg-white/10 hover:bg-white/20 text-white px-6 py-2 rounded-lg backdrop-blur-md border-white/20 cursor-pointer text-center transition-all"
            >
              <a href="#" class="block w-full">About Us</a>
            </li>
            <li
              class="w-full max-w-[12rem] border-2 bg-white/10 hover:bg-white/20 text-white px-6 py-2 rounded-lg backdrop-blur-md border-white/20 cursor-pointer text-center transition-all"
            >
              <a href="#" class="block w-full">Contact Us</a>
            </li>
          </ul>
        </nav>
      </header>

      <main
        class="relative z-10 flex-grow flex items-center justify-center px-6"
      >
        <p
          class="max-w-2xl text-white text-center text-lg md:text-2xl drop-shadow-md"
        >
          Snag top-tier chess equipment and play like a whale!
          <br /><br />
          <span
            class="cursor-pointer bg-white/10 text-4xl font-bold drop-shadow-4xl border-2 px-3 rounded-lg hover:bg-black/80"
            >SHOP NOW</span
          ><br /><br />
          and make every move legendary.
        </p>
      </main>

      <footer class="relative z-10 pb-6"></footer>
    </div>
  </body>
</html>
